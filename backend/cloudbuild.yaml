# Build and deploy LegaLens API to Google Cloud Run.
#
# Trigger (repo root): config backend/cloudbuild.yaml; defaults use backend/Dockerfile and backend/.
# Manual (from backend/):  gcloud builds submit --config=cloudbuild.yaml . --substitutions="_DOCKERFILE=Dockerfile,_CONTEXT=."
#
# Substitutions:
#   _SERVICE_NAME  Cloud Run service name (default: legalens-api)
#   _REGION        e.g. us-central1 (default: us-central1)
#   _REPOSITORY    Artifact Registry repo name (default: legalens)
#   _TAG           Image tag (default: latest; trigger can set to SHORT_SHA)
#   _DOCKERFILE    Dockerfile path (default: backend/Dockerfile for trigger from repo root)
#   _CONTEXT       Build context (default: backend for trigger from repo root)

substitutions:
  _SERVICE_NAME: legalens-api
  _REGION: us-central1
  _REPOSITORY: legalens
  _TAG: latest
  _DOCKERFILE: backend/Dockerfile
  _CONTEXT: backend

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - ${_DOCKERFILE}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${_TAG}
      - ${_CONTEXT}
    id: build

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${_TAG}
    id: push
    waitFor: [build]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${_TAG}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
    id: deploy
    waitFor: [push]

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${_TAG}
